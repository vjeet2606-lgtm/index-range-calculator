name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Production build
        run: npm run build
        env:
          # The Quantitative Engine's frozen math never depends on live
          # credentials — a build-time placeholder is sufficient here and
          # keeps no real secret in CI config. Live credential env vars are
          # configured directly in Vercel, not exercised by this workflow.
          NEXT_TELEMETRY_DISABLED: "1"
